version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - RAILS_ENV=${RAILS_ENV:-development} 
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    command: bash -c "rm -f tmp/pids/server.pid && ./bin/rails server -b 0.0.0.0"

volumes:
  bundle_data:
